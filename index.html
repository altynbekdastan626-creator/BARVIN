                { id: 'v1', name: 'Майкл Джексон', num: 'VIP 1' },
                { id: 'v2', name: 'Шарль', num: 'VIP 2' },
                { id: 'v3', name: 'Фредди Кинг', num: 'VIP 3' },
                { id: 'v4', name: 'Луи Армстронг', num: 'VIP 4' },
                { id: 'v5', name: 'Эльвис Пресли', num: 'VIP 5' }
            ];
            if (!tableParam) {
                const isVipRandom = Math.random() > 0.6;
                if (isVipRandom) {
                    const randomVip = vipCabins[Math.floor(Math.random() * vipCabins.length)];
                    updateTableUI(`${randomVip.num} - ${randomVip.name} (Тест)`, randomVip.num);
                } else {
                    const randomNum = Math.floor(Math.random() * 17) + 1;
                    updateTableUI(`${randomNum} (Тест)`, randomNum.toString());
                }
                return;
            }
            const foundVip = vipCabins.find(v => v.id.toLowerCase() === tableParam.toLowerCase());
            if (foundVip) {
                updateTableUI(`${foundVip.num} - ${foundVip.name}`, foundVip.num);
            } else {
                const tableNum = parseInt(tableParam);
                if (tableNum >= 1 && tableNum <= 17) {
                    updateTableUI(tableNum.toString(), tableNum.toString());
                } else {
                    updateTableUI("1", "1");
                }
            }
        }

        function updateTableUI(fullName, shortName) {
            currentTable = fullName;
            document.getElementById('mainTableBtn').innerHTML = `<span class="btn-icon">🍽️</span> Стол: ${shortName}`;
            document.getElementById('menuTableDisplay').innerText = shortName;
        }

        // Рендер кнопок интерфейса карточки в зависимости от корзины
        function getActionsHtml(id, name, price, img) {
            const qty = cart[id] ? cart[id].quantity : 0;
            if (qty > 0) {
                return `
                    <div class="qty-control">
                        <button class="qty-btn-card" onclick="changeQuantityFromCard(event, '${id}', -1)">-</button>
                        <span class="qty-count-card">${qty}</span>
                        <button class="qty-btn-card" onclick="changeQuantityFromCard(event, '${id}', 1)">+</button>
                    </div>
                `;
            } else {
                return `<button class="add-btn" onclick="addToCart(event, '${id}', '${name}', ${price}, '${img}')">Добавить</button>`;
            }
        }

        function initFullMenuUI() {
            const catContainer = document.getElementById('categoriesContainer');
            const itemsContainer = document.getElementById('menuItemsContainer');
            catContainer.innerHTML = '';
            itemsContainer.innerHTML = '';
            const categories = [...new Set(menuData.map(item => item.category))];
            categories.forEach((cat, index) => {
                const chip = document.createElement('div');
                chip.className = `category-chip ${index === 0 ? 'active' : ''}`;
                chip.innerText = cat;
                chip.id = `chip_${index}`;
                chip.onclick = () => {
                    isBlockScrollSpy = true;
                    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    const targetSection = document.getElementById(`section_${index}`);
                    if (targetSection) {
                        const headerOffset = 135;
                        const elementPosition = targetSection.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: "smooth" });
                    }
                    const container = document.getElementById('categoriesContainer');
                    container.scrollTo({ left: chip.offsetLeft - (container.offsetWidth / 2) + (chip.offsetWidth / 2), behavior: 'smooth' });
                    setTimeout(() => {
                        isBlockScrollSpy = false;
                    }, 800);
                };
                catContainer.appendChild(chip);
                const section = document.createElement('div');
                section.className = 'category-section';
                section.id = `section_${index}`;
                section.dataset.index = index;
                section.innerHTML = `<div class="category-title-label">${cat}</div>`;
                const filtered = menuData.filter(item => item.category === cat);
                
                filtered.forEach(item => {
                    const safeName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeDesc = item.desc.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const actionsHtml = getActionsHtml(item.id, safeName, item.price, item.img);

                    section.innerHTML += ` 
                        <div class="menu-item-card"> 
                            <img src="${item.img}" alt="${item.name}" class="item-img" onclick="openModal('${safeName}', '${item.img}', '${safeDesc}')"> 
                            <div class="item-details"> 
                                <div class="item-title">${item.name}</div> 
                                <div class="item-actions"> 
                                    <div class="price-pill">${item.price.toLocaleString('ru-RU')} ₸</div> 
                                    <div class="item-actions-wrapper" id="action_wrap_${item.id}">
                                        ${actionsHtml}
                                    </div>
                                </div> 
                            </div> 
                        </div> 
                    `;
                });
                itemsContainer.appendChild(section);
            });
        }

        window.addEventListener('scroll', () => {
            const menuSection = document.getElementById('menuSection');
            if (menuSection.style.display !== 'block' || isBlockScrollSpy) return;
            const sections = document.querySelectorAll('.category-section');
            const scrollPos = window.scrollY || document.documentElement.scrollTop;
            let activeIndex = 0;
            const offsetThreshold = 160;
            sections.forEach(section => {
                if (scrollPos >= (section.offsetTop - offsetThreshold)) {
                    activeIndex = section.dataset.index;
                }
            });
            const targetChip = document.getElementById(`chip_${activeIndex}`);
            if (targetChip && !targetChip.classList.contains('active')) {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                targetChip.classList.add('active');
                const container = document.getElementById('categoriesContainer');
                container.scrollTo({ left: targetChip.offsetLeft - (container.offsetWidth / 2) + (targetChip.offsetWidth / 2), behavior: 'smooth' });
            }
        });

        function showCustomAlert(title, text) {
            document.getElementById('customAlertTitle').innerHTML = title;
            document.getElementById('customAlertText').innerHTML = text;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function closeCustomAlert() {
            document.getElementById('customAlert').style.display = 'none';
        }

        function openMenu() {
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('menuSection').style.display = 'block';
            if (document.getElementById('categoriesContainer').innerHTML === '') {
                initFullMenuUI();
            }
            updateCartUI();
            window.scrollTo(0, 0);
        }

        function closeMenu() {
            document.getElementById('menuSection').style.display = 'none';
            document.getElementById('landingScreen').style.display = 'flex';
            updateCartUI();
        }

        function openInfoModal() {
            document.getElementById('infoModal').style.display = 'flex';
        }

        function callWaiter() {
            let tableText = currentTable.includes('VIP') ? currentTable : `Стол №${currentTable}`;
            const message = `🔔 <b>Вызов официанта!</b>\n📍 <b>${tableText}</b>.`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: "HTML" })
            })
            .then(res => res.ok ? showCustomAlert("Вызов принят!", "Официант уже идет! 🛎️") : showCustomAlert("Ошибка", "Позовите сотрудника."))
            .catch(() => showCustomAlert("Ошибка сети", "Нет интернета."));
        }

        function openModal(title, imgSrc, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = imgSrc;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('itemModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Обновление отдельной карточки меню после изменения количества
        function updateItemActionUI(id, name, price, img) {
            const wrapper = document.getElementById(`action_wrap_${id}`);
            if (wrapper) {
                wrapper.innerHTML = getActionsHtml(id, name, price, img);
            }
        }

        function addToCart(event, id, name, price, img) {
            event.stopPropagation();
            if (cart[id]) cart[id].quantity++;
            else cart[id] = { name: name, price: price, img: img, quantity: 1 };
            
            updateCartUI();
            updateItemActionUI(id, name, price, img);
        }

        function updateCartUI() {
            let totalItems = 0, totalSum = 0;
            for (let id in cart) {
                totalItems += cart[id].quantity;
                totalSum += cart[id].quantity * cart[id].price;
            }
            document.getElementById('cartCount').innerText = totalItems;
            document.getElementById('cartTotal').innerText = totalSum.toLocaleString('ru-RU') + ' ₸';
            const widget = document.getElementById('cartWidget');
            if (totalItems > 0 && document.getElementById('menuSection').style.display === 'block') {
                widget.classList.add('visible');
            } else {
                widget.classList.remove('visible');
            }
        }

        function openCartModal() {
            const listContainer = document.getElementById('cartItemsList');
            listContainer.innerHTML = '';
            let totalSum = 0, hasItems = false;
            for (let id in cart) {
                hasItems = true;
                const item = cart[id];
                totalSum += item.price * item.quantity;
                listContainer.innerHTML += ` <div class="cart-item-row"> <img src="${item.img}" class="cart-item-thumb"> <div class="cart-item-info"> <div class="cart-item-name">${item.name}</div> <div class="cart-item-price">${item.price.toLocaleString('ru-RU')} ₸</div> </div> <div class="cart-item-controls"> <button class="qty-btn" onclick="changeQuantity('${id}', -1)">-</button> <span class="qty-count">${item.quantity}</span> <button class="qty-btn" onclick="changeQuantity('${id}', 1)">+</button> </div> </div> `;
            }
            document.getElementById('submitOrderBtn').disabled = !hasItems;
            document.getElementById('cartModalTotal').innerText = totalSum.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('cartModal').style.display = 'flex';
        }

        // Вызов из модалки корзины
        function changeQuantity(id, change) {
            if (!cart[id]) return;
            cart[id].quantity += change;
            if (cart[id].quantity <= 0) delete cart[id];
            
            updateCartUI();
            
            const itemDef = menuData.find(m => m.id === id);
            if (itemDef) {
                const safeName = itemDef.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                updateItemActionUI(id, safeName, itemDef.price, itemDef.img);
            }
            
            const cartModal = document.getElementById('cartModal');
            if (cartModal.style.display === 'flex') {
                if (Object.keys(cart).length === 0) {
                    closeModal('cartModal');
                } else {
                    openCartModal();
                }
            }
        }

        // Вызов с карточки блюда (чтобы не открывалась модалка корзины)
        function changeQuantityFromCard(event, id, change) {
            event.stopPropagation();
            changeQuantity(id, change);
        }

        function checkout() {
            let tableText = currentTable.includes('VIP') ? currentTable : `СТОЛ №${currentTable}`;
            let totalSum = 0, textMessage = `👑 <b>ЗАКАЗ | BARVIN</b>\n📍 <b>${tableText}</b>\n\n`;
            for (let id in cart) {
                const item = cart[id];
                const cost = item.price * item.quantity;
                totalSum += cost;
                textMessage += `<b>${item.name}</b>\n└ ${item.quantity} х ${item.price.toLocaleString('ru-RU')} ₸ = <i>${cost.toLocaleString('ru-RU')} ₸</i>\n\n`;
            }
            textMessage += `➖➖➖➖➖➖➖➖➖➖\n💳 <b>ИТОГО: ${totalSum.toLocaleString('ru-RU')} ₸</b>`;
            const checkoutBtn = document.getElementById('submitOrderBtn');
            checkoutBtn.disabled = true;
            checkoutBtn.innerText = "Отправка...";
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: textMessage, parse_mode: "HTML" })
            })
            .then(res => {
                if (res.ok) {
                    cart = {};
                    updateCartUI();
                    closeModal('cartModal');
                    showCustomAlert("Заказ принят!", "Успешно отправлен на кухню! 😊");
                    initFullMenuUI(); // Сбрасываем кнопки добавления
                } else {
                    showCustomAlert("Ошибка", "Позовите официанта.");
                }
            })
            .catch(() => showCustomAlert("Ошибка сети", "Нет интернета."))
            .finally(() => {
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Оформить заказ";
            });
        }
        
        checkTableFromURL();
    </script>
</body>
</html>
